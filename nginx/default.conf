upstream backend {
    server api:4000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name marketing-backend.ornatesolar.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name marketing-backend.ornatesolar.com;

    ssl_certificate /etc/letsencrypt/live/marketing-backend.ornatesolar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marketing-backend.ornatesolar.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    # API requests — CORS handled by Express, not nginx
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Health check
    location /health {
        proxy_pass http://backend/api/health;
    }
}
